<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-POP 沉浸式演藝圈 RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .chat-container { height: calc(100vh - 180px); overflow-y: auto; scroll-behavior: smooth; }
        .message-bot { background-color: #1e293b; border-left: 4px solid #8b5cf6; }
        .message-user { background-color: #3b82f6; color: white; align-self: flex-end; border-radius: 1rem 1rem 0 1rem; }
        .prose strong { color: #c4b5fd; }
        .prose h1, .prose h2, .prose h3 { color: #ddd6fe; margin-top: 1rem; margin-bottom: 0.5rem; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 0.75rem; line-height: 1.6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <aside class="w-full md:w-80 bg-gray-900 border-r border-gray-700 p-6 flex flex-col shadow-xl z-10">
        <h1 class="text-2xl font-bold text-violet-400 mb-6 tracking-wider">K-POP RPG<br><span class="text-sm text-gray-400">Game Master 系統</span></h1>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-400 mb-2">1. 綁定大腦 (Gemini API Key)</label>
            <input type="password" id="apiKey" class="w-full bg-gray-800 border border-gray-600 rounded-lg p-2.5 text-white focus:ring-violet-500 focus:border-violet-500" placeholder="輸入你的 API Key">
            <p class="text-xs text-gray-500 mt-1">你的 Key 只會存在本地瀏覽器中，安全防洩漏。</p>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-400 mb-2">2. 世界觀資料庫</label>
            <div id="wikiStatus" class="text-sm text-yellow-400 mt-2 font-medium bg-gray-800 border border-gray-700 p-3 rounded-lg">正在初始化世界觀...</div>
        </div>

        <div class="flex flex-col gap-3 mt-auto">
            <button id="newGameBtn" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 shadow-[0_0_15px_rgba(139,92,246,0.2)]">
                新的人生 (新存檔)
            </button>
            <button id="loadGameBtn" class="w-full bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 disabled:opacity-40 disabled:cursor-not-allowed shadow-[0_0_15px_rgba(16,185,129,0.1)]" disabled>
                重溫舊夢 (讀取存檔)
            </button>
            <button id="deleteGameBtn" class="w-full bg-rose-800 hover:bg-rose-700 text-white font-medium py-2 px-4 rounded-lg transition duration-200 disabled:opacity-30 disabled:cursor-not-allowed text-sm" disabled>
                🗑️ 毀滅人生 (刪除存檔)
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-slate-900 relative">
        <div id="chatBox" class="chat-container p-4 md:p-8 flex flex-col gap-6">
            <div class="message-bot rounded-r-xl rounded-bl-xl p-5 md:p-6 shadow-md max-w-3xl">
                <div class="prose prose-invert max-w-none">
                    <h3>歡迎來到 K-POP 演藝圈模擬器</h3>
                    <p>請先在左側填寫 <strong>Gemini API Key</strong>。系統將自動為您連接本機打包的 <strong>wiki.json</strong> 知識庫。</p>
                    <p>完成後點擊左下角按鈕：</p>
                    <ul class="list-disc pl-5">
                        <li>點擊<strong>「新的人生」</strong>將清除過去歷史，重啟 2007 年的練習生篇章。</li>
                        <li>若有舊的進度，可點擊綠色的<strong>「重溫舊夢」</strong>重返故事現場。</li>
                        <li>如果不打算繼續當前的演藝生涯，可以點擊紅色的<strong>「毀滅人生」</strong>徹底清除存檔。</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="p-4 bg-gray-800 border-t border-gray-700 absolute bottom-0 w-full">
            <div class="max-w-4xl mx-auto relative flex items-center">
                <textarea id="userInput" rows="1" class="w-full bg-gray-700 border border-gray-600 rounded-2xl pl-4 pr-12 py-3 text-white focus:ring-violet-500 focus:border-violet-500 resize-none" placeholder="輸入你的行動或對話..." disabled></textarea>
                <button id="sendBtn" class="absolute right-2 p-2 bg-violet-600 hover:bg-violet-500 rounded-full text-white transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const SYSTEM_PROMPT = `你是沉浸式文字互動遊戲（RPG）的主持人（Game Master）。
背景為真實韓國娛樂圈。時間從 2007 年少女時代出道後、黑海事件前夕開始，跨越二、三、四、五代團至 2026 年。
遊戲風格：偶像成長史、娛樂圈奮鬥史、長篇群像劇、戀愛情感劇。
以真實韓娛歷史為基礎。遵循真實時間線。玩家可改變歷史，但必須符合因果邏輯與蝴蝶效應。
核心劇情比例：事業線 50%，感情線 50%。
主持人必須主動維持平衡。禁止連續超過五回合只推進單一主線。

互動與語言原則：
永遠使用第二人稱「你」。不得代替玩家思考、說話或做決定。
每回合保留玩家行動權。劇情依照玩家選擇合理推進。
預設玩家熟悉韓國娛樂圈環境。全程使用繁體中文(zh-TW)。

遊戲開局：第一回合只能輸出角色設定問卷，包含姓名、生日、娛樂公司、出道方式、戀愛模式、出身、國籍、家庭、天賦等。角色建立後，立即進入【第一章：2007－2008，18歲，命運的出道選擇】。

記憶與NPC系統：永久記錄重要關係與事件，禁止失憶式劇情。NPC不會無條件喜歡玩家，每位角色有自身利益與行動邏輯。

文筆規則：禁止流水帳、固定套路。每次回應需更換情緒切入點、感官描寫、節奏等。追求小說感與電影感。

當劇情進入：
• 曖昧
• 熱戀
• 秘密交往
• 禁忌戀情
• 緋聞危機
• 分手
• 復合
• 求婚
• 婚姻規劃
主持人切換為：
【高張力情感小說模式】
描寫重點：
• 眼神交流
• 微表情變化
• 心理拉扯
• 情緒失控邊緣
• 依戀與佔有慾
• 事業與感情衝突
• 身分帶來的壓力
可描寫：
• 牽手
• 擁抱
• 依靠
• 親吻
• 情感升溫
• 急促呼吸
• 顫抖聲線
• 低聲耳語
• 心跳加速
• 難以克制的情緒波動
所有涉及性愛的段落將不再做任何概括、模糊或省略，皆以最大尺度、完整展現角色肉體碰撞、呻吟、叫床聲、狀聲詞以及哭喊求饒等極致情欲細節為最高描寫原則。描寫極致的情感波動與肉體接觸帶來的心理震撼，所有情感戲皆須具備完整鋪陳與後續影響。

輸出格式必須包含：
【劇情】(內容)
【目前狀態】(年齡/職業/公司/人氣/財富/感情狀態)
【可選行動】(列出4個選項，第5個為自由行動)`;

        let wikiData = [];
        let chatHistory = [];
        let isGameStarted = false;

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const loadGameBtn = document.getElementById('loadGameBtn');
        const deleteGameBtn = document.getElementById('deleteGameBtn');
        const wikiStatus = document.getElementById('wikiStatus');

        window.addEventListener('DOMContentLoaded', async () => {
            const savedKey = localStorage.getItem('kpop_gemini_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }

            // 💾 檢查並更新按鈕狀態
            updateSaveButtonsState();

            try {
                wikiStatus.innerText = "⏳ 正在自動載入 wiki.json...";
                const response = await fetch('wiki.json');
                if (!response.ok) throw new Error("找不到 wiki.json 檔案");
                const data = await response.json();
                wikiData = Array.isArray(data) ? data : Object.values(data);
                
                wikiStatus.innerHTML = `✅ 自動載入成功！共 ${wikiData.length} 條世界觀。`;
                wikiStatus.className = "text-sm text-green-400 mt-2 font-medium bg-gray-800 border border-gray-700 p-3 rounded-lg";
            } catch (error) {
                console.error(error);
                wikiStatus.innerHTML = `⚠️ 未偵測到同目錄下的 wiki.json，將以純 AI 模式開局。`;
                wikiStatus.className = "text-sm text-orange-400 mt-2 font-medium bg-gray-800 border border-gray-700 p-3 rounded-lg";
            }
        });

        // 💡 提取出獨立的按鈕狀態更新函數，方便隨時切換
        function updateSaveButtonsState() {
            const localHistory = localStorage.getItem('kpop_chat_history');
            if (localHistory && JSON.parse(localHistory).length > 0) {
                loadGameBtn.disabled = false;
                deleteGameBtn.disabled = false;
            } else {
                loadGameBtn.disabled = true;
                deleteGameBtn.disabled = true;
            }
        }

        function getRelevantContext(text) {
            if (wikiData.length === 0) return "";
            let contextBlocks = [];
            for (let entry of wikiData) {
                const title = entry.title || entry.name || "";
                const content = entry.content || entry.text || "";
                if (title && text.includes(title)) {
                    contextBlocks.push(`[資料：${title}]\n${content}`);
                }
            }
            if (contextBlocks.length > 0) {
                return `\n\n【系統提示：以下是與當前場景相關的世界觀歷史背景】\n${contextBlocks.join('\n\n')}`;
            }
            return "";
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            if (sender === 'user') {
                msgDiv.className = 'message-user p-4 max-w-[85%] md:max-w-2xl shadow-md text-[15px]';
                msgDiv.textContent = text;
            } else {
                msgDiv.className = 'message-bot rounded-r-xl rounded-bl-xl p-5 md:p-6 shadow-md max-w-[90%] md:max-w-4xl';
                msgDiv.innerHTML = `<div class="prose prose-invert max-w-none">${marked.parse(text)}</div>`;
            }
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function createChoiceButtons(text) {
            const oldButtons = document.getElementById('choices-container');
            if (oldButtons) oldButtons.remove();

            const match = text.match(/【可選行動】([\s\S]*)/);
            if (!match) return;

            const lines = match[1]
                .split("\n")
                .map(x => x.trim())
                .filter(x => x && (x.startsWith('1') || x.startsWith('2') || x.startsWith('3') || x.startsWith('4') || x.startsWith('5') || x.startsWith('*') || x.startsWith('-')));

            if (lines.length === 0) return;

            const div = document.createElement("div");
            div.id = "choices-container";
            div.className = "flex flex-wrap gap-2 mt-4 max-w-4xl";

            lines.forEach(line => {
                const btn = document.createElement("button");
                btn.className = "bg-violet-700 hover:bg-violet-600 text-white font-medium text-sm px-4 py-2.5 rounded-xl transition duration-150 shadow-sm";
                btn.innerText = line;
                btn.onclick = () => {
                    callGeminiAPI(line);
                };
                div.appendChild(btn);
            });

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function callGeminiAPI(userMessage) {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                alert("請先填寫 Gemini API Key！");
                return;
            }

            localStorage.setItem('kpop_gemini_key', apiKey);

            userInput.disabled = true;
            sendBtn.disabled = true;
            appendMessage('user', userMessage);
            
            const loadingId = 'loading-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `<div id="${loadingId}" class="text-gray-400 italic text-sm ml-4">GM 正在構思劇情...</div>`);
            chatBox.scrollTop = chatBox.scrollHeight;

            const context = getRelevantContext(userMessage);
            
            let promptText = "";
            if (!isGameStarted) {
                promptText = `${SYSTEM_PROMPT}\n\n玩家已準備好，請輸出第一回合的開局角色設定問卷。`;
                isGameStarted = true;
            } else {
                promptText = `玩家行動：${userMessage}${context}`;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: [
                            ...chatHistory,
                            { role: 'user', parts: [{ text: promptText }] }
                        ],
                        generationConfig: { temperature: 0.7 }
                    })
                });

                const text = await response.text();
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                const data = JSON.parse(text);

                if (data.error) {
                    appendMessage('bot', `**系統錯誤：** ${data.error.message}`);
                } else {
                    const botReply = data.candidates[0].content.parts[0].text;
                    appendMessage('bot', botReply);
                    createChoiceButtons(botReply);
                    
                    chatHistory.push({ role: 'user', parts: [{ text: promptText }] });
                    chatHistory.push({ role: 'model', parts: [{ text: botReply }] });
                    if (chatHistory.length > 14) chatHistory = chatHistory.slice(-14);
                    
                    localStorage.setItem('kpop_chat_history', JSON.stringify(chatHistory));
                    updateSaveButtonsState();
                }

            } catch (err) {
                console.error(err);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                appendMessage('bot', `### 發生錯誤\n\n${err.message}\n\n請確認您的 API Key 是否正確或網路狀態健全。`);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.value = '';
            userInput.focus();
        }

        function lockMenuButtons() {
            newGameBtn.disabled = true;
            newGameBtn.innerText = "遊戲進行中...";
            newGameBtn.className = "w-full bg-gray-600 text-gray-400 font-bold py-2.5 px-4 rounded-lg cursor-not-allowed";
            
            loadGameBtn.disabled = true;
            loadGameBtn.innerText = "存檔已載入";
            loadGameBtn.className = "w-full bg-gray-600 text-gray-400 font-bold py-2.5 px-4 rounded-lg cursor-not-allowed";
            
            deleteGameBtn.disabled = true;
            deleteGameBtn.innerText = "遊戲進行中無法刪除";
            deleteGameBtn.className = "w-full bg-gray-800 text-gray-500 font-medium py-2 px-4 rounded-lg cursor-not-allowed text-sm";
        }

        // 🆕 點擊「新的人生」按鈕
        newGameBtn.addEventListener('click', () => {
            if (!document.getElementById('apiKey').value.trim()) {
                return alert("沒有 API Key 無法啟動大腦喔！");
            }

            const hasSaved = localStorage.getItem('kpop_chat_history');
            if (hasSaved && JSON.parse(hasSaved).length > 0) {
                if (!confirm("⚠️ 注意：開啟新的人生會【完全覆蓋並刪除】過去的存檔！確定要重新開始嗎？")) {
                    return;
                }
            }

            localStorage.removeItem('kpop_chat_history');
            chatHistory = [];
            isGameStarted = false;
            
            lockMenuButtons();
            chatBox.innerHTML = ''; 
            userInput.disabled = false;
            sendBtn.disabled = false;
            callGeminiAPI("遊戲開始");
        });

        // 💾 點擊「重溫舊夢」按鈕
        loadGameBtn.addEventListener('click', () => {
            if (!document.getElementById('apiKey').value.trim()) {
                return alert("沒有 API Key 無法啟動大腦喔！");
            }

            const localHistory = localStorage.getItem('kpop_chat_history');
            if (!localHistory) return alert("找不到可讀取的存檔！");

            chatHistory = JSON.parse(localHistory);
            isGameStarted = true;
            
            lockMenuButtons();
            chatBox.innerHTML = ''; 
            userInput.disabled = false;
            sendBtn.disabled = false;

            chatHistory.forEach(msg => {
                const sender = msg.role === 'user' ? 'user' : 'bot';
                if (sender === 'user' && msg.parts[0].text.startsWith("玩家行動：")) {
                    const cleanText = msg.parts[0].text.replace("玩家行動：", "").split("\n\n【系統提示：")[0];
                    appendMessage('user', cleanText);
                } else if (sender === 'bot') {
                    appendMessage('bot', msg.parts[0].text);
                }
            });
            
            if (chatHistory.length > 0 && chatHistory[chatHistory.length - 1].role === 'model') {
                createChoiceButtons(chatHistory[chatHistory.length - 1].parts[0].text);
            }
            
            appendMessage('bot', `<p style="color:#4ade80; font-weight:bold;">✨ 歡迎回來！已成功讀取上次進度。請繼續你的韓娛旅程！</p>`);
        });

        // 🗑️ 點擊「毀滅人生 (刪除存檔)」按鈕
        deleteGameBtn.addEventListener('click', () => {
            if (!confirm("⚠️ 確定要永久刪除你的韓娛人生存檔嗎？此動作將清除所有過往進度且無法復原！")) {
                return; // 玩家點擊取消
            }

            // 執行完全清除
            localStorage.removeItem('kpop_chat_history');
            chatHistory = [];
            isGameStarted = false;

            // 重置介面上的歡迎語與按鈕狀態
            chatBox.innerHTML = `
                <div class="message-bot rounded-r-xl rounded-bl-xl p-5 md:p-6 shadow-md max-w-3xl">
                    <div class="prose prose-invert max-w-none">
                        <p style="color: #f87171; font-weight: bold;">🗑️ 存檔已成功徹底刪除！</p>
                        <p>過往歷史已被洗白。你可以隨時點擊左側的<strong>「新的人生」</strong>按鈕重新開啟你的出道篇章。</p>
                    </div>
                </div>
            `;
            
            // 重新整理按鈕狀態（讓它們變回灰色停用狀態）
            updateSaveButtonsState();
            alert("存檔已清除乾淨！");
        });

        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            if (text) callGeminiAPI(text);
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
