<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-POP 沉浸式演藝圈 RPG</title>
    
    <!-- 📱 PWA 全螢幕優化：消除 iPhone Safari 上下白邊 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="K-POP RPG">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- ☁️ 載入 Google 官方 API 腳本 -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .chat-container { height: calc(100vh - 180px); overflow-y: auto; scroll-behavior: smooth; }
        .message-bot { background-color: #1e293b; border-left: 4px solid #8b5cf6; }
        .message-user { background-color: #3b82f6; color: white; align-self: flex-end; border-radius: 1rem 1rem 0 1rem; }
        .prose strong { color: #c4b5fd; }
        .prose h1, .prose h2, .prose h3 { color: #ddd6fe; margin-top: 1rem; margin-bottom: 0.5rem; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 0.75rem; line-height: 1.6; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden viewport-fit-cover">

    <aside class="w-full md:w-85 bg-gray-900 border-r border-gray-700 p-5 flex flex-col shadow-xl z-10 overflow-y-auto">
        <h1 class="text-2xl font-bold text-violet-400 mb-4 tracking-wider">K-POP RPG<br><span class="text-sm text-gray-400">Game Master 系統</span></h1>
        
        <!-- 🔑 1. Gemini Key -->
        <div class="mb-4">
            <label class="block text-xs font-medium text-gray-400 mb-1">1. Gemini 大腦 API Key</label>
            <input type="password" id="apiKey" autocomplete="new-password" class="w-full bg-gray-800 border border-gray-600 rounded-lg p-2 text-sm text-white focus:ring-violet-500 focus:border-violet-500" placeholder="輸入 Gemini API Key">
        </div>

        <!-- ☁️ 2. Google 雲端硬碟同步設定區 -->
        <div class="mb-4 bg-gray-800/60 p-3 border border-gray-700 rounded-xl">
            <label class="block text-xs font-bold text-emerald-400 mb-2 tracking-wide">☁️ 跨端雲端同步 (Google Drive)</label>
            <div class="flex flex-col gap-2">
                <input type="password" id="gDriveKey" autocomplete="new-password" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs text-white" placeholder="Google 雲端 API 金鑰">
                <input type="text" id="gClientId" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-xs text-white" placeholder="Google Client ID">
                
                <div class="grid grid-cols-2 gap-2 mt-1">
                    <button id="cloudUploadBtn" class="bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-1.5 px-2 rounded text-xs transition disabled:opacity-40" disabled>📤 上傳雲端</button>
                    <button id="cloudDownloadBtn" class="bg-teal-700 hover:bg-teal-600 text-white font-bold py-1.5 px-2 rounded text-xs transition disabled:opacity-40" disabled>📥 同步雲端</button>
                </div>
                <div id="cloudStatus" class="text-[11px] text-gray-400 text-center mt-1">請先填寫上方雲端憑證</div>
            </div>
        </div>

        <div class="mb-4">
            <label class="block text-xs font-medium text-gray-400 mb-1">3. 世界觀資料庫</label>
            <div id="wikiStatus" class="text-xs text-yellow-400 font-medium bg-gray-800 border border-gray-700 p-2 rounded-lg">正在初始化世界觀...</div>
        </div>

        <!-- 🎮 遊戲核心按鈕 -->
        <div class="flex flex-col gap-2 mt-auto">
            <button id="newGameBtn" class="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 text-sm shadow-[0_0_15px_rgba(139,92,246,0.2)]">
                新的人生 (新存檔)
            </button>
            <button id="loadGameBtn" class="w-full bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-2.5 px-4 rounded-lg transition duration-200 text-sm disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                重溫舊夢 (讀取本地)
            </button>
            <button id="deleteGameBtn" class="w-full bg-rose-950 hover:bg-rose-900 text-rose-300 font-medium py-1.5 px-4 rounded-lg transition duration-200 disabled:opacity-30 text-xs" disabled>
                🗑️ 刪除本地存檔
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-slate-900 relative">
        <div id="chatBox" class="chat-container p-4 md:p-8 flex flex-col gap-6">
            <div class="message-bot rounded-r-xl rounded-bl-xl p-5 md:p-6 shadow-md max-w-3xl">
                <div class="prose prose-invert max-w-none">
                    <h3>歡迎來到 K-POP 演藝圈模擬器</h3>
                    <p>請先填寫 <strong>Gemini API Key</strong> 以及 <strong>Google 雲端同步憑證</strong>，即可享受電腦、手機隨時雲端存取同步的體驗！</p>
                    <p>完成後點擊左下角按鈕開局，或是點選<strong>「同步雲端」</strong>拉取其他設備的進度。</p>
                </div>
            </div>
        </div>

        <!-- 底部輸入框 -->
        <div class="p-4 bg-gray-800 border-t border-gray-700 absolute bottom-0 w-full pb-safe">
            <div class="max-w-4xl mx-auto relative flex items-center">
                <textarea id="userInput" rows="1" class="w-full bg-gray-700 border border-gray-600 rounded-2xl pl-4 pr-12 py-3 text-white focus:ring-violet-500 focus:border-violet-500 resize-none" placeholder="輸入你的行動或對話..." disabled></textarea>
                <button id="sendBtn" class="absolute right-2 p-2 bg-violet-600 hover:bg-violet-500 rounded-full text-white transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const SYSTEM_PROMPT = `你是沉浸式文字互動遊戲（RPG）的主持人（Game Master）。
背景為真實韓國娛樂圈。時間從 2007 年少女時代出道後、黑海事件前夕開始，跨越二、三、四、五代團至 2026 年。
遊戲風格：偶像成長史、娛樂圈奮鬥史、長篇群像劇、戀愛情感劇。
以真實韓娛歷史為基礎。遵循真實時間線。玩家可改變歷史，但必須符合因果邏輯與蝴蝶效應。
核心劇情比例：事業線 50%，感情線 50%。
主持人必須主動維持平衡。禁止連續超過五回合只推進單一主線。

互動與語言原則：
永遠使用第二人稱「你」。不得代替玩家思考、說話或做決定。
每回合保留玩家行動權。劇情依照玩家選擇合理推進。
預設玩家熟悉韓國娛樂圈環境。全程使用繁體中文(zh-TW)。

遊戲開局：第一回合只能輸出角色設定問卷，包含姓名、生日、娛樂公司、出道方式、戀愛模式、出身、國籍、家庭、天賦等。角色建立後，立即進入【第一章：2007－2008，18歲，命運的出道選擇】。

記憶與NPC系統：永久記錄重要關係與事件，禁止失憶式劇情。NPC不會無條件喜歡玩家，每位角色有自身利益與行動邏輯。

文筆規則：禁止流水帳、固定套路。每次回應需更換情緒切入點、感官描寫、節奏等。追求小說感與電影感。

當劇情進入：曖昧、熱戀、秘密交往、禁忌戀情、緋聞危機、分手、復合、求婚、婚姻規劃，主持人切換為【高張力情感小說模式】，加強細節描寫與心理拉扯。所有情感戲皆須具備完整鋪陳與後續影響。

輸出格式必須包含：
【劇情】(內容)
【目前狀態】(年齡/職業/公司/人氣/財富/感情狀態)
【可選行動】(列出4個選項，第5個為自由行動)`;

        let wikiData = [];
        let chatHistory = [];
        let isGameStarted = false;

        // Google Sync 變數
        let tokenClient;
        let accessToken = null;
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const loadGameBtn = document.getElementById('loadGameBtn');
        const deleteGameBtn = document.getElementById('deleteGameBtn');
        const wikiStatus = document.getElementById('wikiStatus');
        
        const gDriveKeyInput = document.getElementById('gDriveKey');
        const gClientIdInput = document.getElementById('gClientId');
        const cloudUploadBtn = document.getElementById('cloudUploadBtn');
        const cloudDownloadBtn = document.getElementById('cloudDownloadBtn');
        const cloudStatus = document.getElementById('cloudStatus');

        window.addEventListener('DOMContentLoaded', async () => {
            // 自動帶入儲存的憑證
            if(localStorage.getItem('kpop_gemini_key')) document.getElementById('apiKey').value = localStorage.getItem('kpop_gemini_key');
            if(localStorage.getItem('kpop_gdrive_key')) gDriveKeyInput.value = localStorage.getItem('kpop_gdrive_key');
            if(localStorage.getItem('kpop_gclient_id')) gClientIdInput.value = localStorage.getItem('kpop_gclient_id');

            updateSaveButtonsState();
            checkCloudInputs();

            // 監聽雲端憑證輸入
            gDriveKeyInput.addEventListener('input', checkCloudInputs);
            gClientIdInput.addEventListener('input', checkCloudInputs);

            // 自動載入世界觀
            try {
                wikiStatus.innerText = "⏳ 正在自動載入 wiki.json...";
                const response = await fetch('wiki.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                wikiData = Array.isArray(data) ? data : Object.values(data);
                wikiStatus.innerHTML = `✅ 自動載入成功！共 ${wikiData.length} 條世界觀。`;
                wikiStatus.className = "text-xs text-green-400 font-medium bg-gray-800 border border-gray-700 p-2 rounded-lg";
            } catch (error) {
                wikiStatus.innerHTML = `⚠️ 未偵測到 wiki.json，以純 AI 開局。`;
                wikiStatus.className = "text-xs text-orange-400 font-medium bg-gray-800 border border-gray-700 p-2 rounded-lg";
            }
        });

        function updateSaveButtonsState() {
            const localHistory = localStorage.getItem('kpop_chat_history');
            if (localHistory && JSON.parse(localHistory).length > 0) {
                loadGameBtn.disabled = false;
                deleteGameBtn.disabled = false;
            } else {
                loadGameBtn.disabled = true;
                deleteGameBtn.disabled = true;
            }
        }

        function checkCloudInputs() {
            const key = gDriveKeyInput.value.trim();
            const id = gClientIdInput.value.trim();
            if(key && id) {
                cloudUploadBtn.disabled = false;
                cloudDownloadBtn.disabled = false;
                cloudStatus.innerText = "🟢 雲端憑證已填寫，隨時可進行同步";
                localStorage.setItem('kpop_gdrive_key', key);
                localStorage.setItem('kpop_gclient_id', id);
            } else {
                cloudUploadBtn.disabled = true;
                cloudDownloadBtn.disabled = true;
                cloudStatus.innerText = "請先填寫上方雲端憑證";
            }
        }

        // ================== ☁️ GOOGLE DRIVE 雲端同步邏輯核心 ==================
        
        async function initGoogleAuth() {
            return new Promise((resolve, reject) => {
                try {
                    gapi.load('client', async () => {
                        await gapi.client.init({
                            apiKey: gDriveKeyInput.value.trim(),
                            discoveryDocs: [DISCOVERY_DOC],
                        });
                        
                        tokenClient = google.accounts.oauth2.initTokenClient({
                            client_id: gClientIdInput.value.trim(),
                            scope: SCOPES,
                            callback: (resp) => {
                                if (resp.error !== undefined) {
                                    reject(resp);
                                    return;
                                }
                                accessToken = resp.access_token;
                                resolve();
                            },
                        });
                        
                        if (accessToken === null) {
                            tokenClient.requestAccessToken({prompt: 'consent'});
                        } else {
                            resolve();
                        }
                    });
                } catch (err) {
                    reject(err);
                }
            });
        }

        // 📤 上傳到雲端
        cloudUploadBtn.addEventListener('click', async () => {
            const localHistory = localStorage.getItem('kpop_chat_history');
            if(!localHistory || JSON.parse(localHistory).length === 0) {
                return alert("目前本機沒有任何進度可以上傳喔！");
            }
            
            cloudStatus.innerText = "⏳ 正在驗證雲端權限...";
            try {
                await initGoogleAuth();
                cloudStatus.innerText = "⏳ 正在尋找雲端現有存檔...";
                
                const response = await gapi.client.drive.files.list({
                    q: "name='kpop_rpg_cloud_save.json' and trashed=false",
                    fields: 'files(id, name)',
                    spaces: 'drive'
                });
                
                const files = response.result.files;
                const fileContent = JSON.stringify({
                    chatHistory: JSON.parse(localHistory),
                    isGameStarted: isGameStarted
                });
                
                if (files.length > 0) {
                    const fileId = files[0].id;
                    cloudStatus.innerText = "⏳ 正在覆蓋雲端舊存檔...";
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: fileContent
                    });
                } else {
                    cloudStatus.innerText = "⏳ 正在建立雲端新存檔...";
                    const metadata = {
                        name: 'kpop_rpg_cloud_save.json',
                        mimeType: 'application/json'
                    };
                    
                    const form = new FormData();
                    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                    form.append('media', new Blob([fileContent], { type: 'application/json' }));
                    
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}` },
                        body: form
                    });
                }
                
                cloudStatus.innerText = "✅ 雲端備份成功！";
                alert("🎉 進度已完美同步至 Google 雲端硬碟！手機可以隨時同步下載了。");
            } catch (err) {
                console.error(err);
                cloudStatus.innerText = "❌ 雲端同步失敗";
                alert("同步失敗，請檢查 API Key / Client ID 是否填寫正確，或是否將登入帳號加入測試人員名單。");
            }
        });

        // 📥 從雲端同步下載進度
        cloudDownloadBtn.addEventListener('click', async () => {
            cloudStatus.innerText = "⏳ 正在驗證雲端權限...";
            try {
                await initGoogleAuth();
                cloudStatus.innerText = "⏳ 正在拉取雲端資料...";
                
                const response = await gapi.client.drive.files.list({
                    q: "name='kpop_rpg_cloud_save.json' and trashed=false",
                    fields: 'files(id, name)',
                    spaces: 'drive'
                });
                
                const files = response.result.files;
                if (files.length === 0) {
                    cloudStatus.innerText = "🟢 雲端沒有發現任何存檔";
                    return alert("雲端硬碟裡找不到名為 kpop_rpg_cloud_save.json 的存檔喔！請先用有進度的設備點擊「上傳雲端」。");
                }
                
                const fileId = files[0].id;
                const fileResp = await gapi.client.drive.files.get({
                    fileId: fileId,
                    alt: 'media'
                });
                
                const cloudData = fileResp.result;
                if(cloudData && cloudData.chatHistory) {
                    if(!confirm("📥 偵測到雲端存檔！下載雲端資料會將此設備目前的進度覆蓋，確定要下載嗎？")) return;
                    
                    localStorage.setItem('kpop_chat_history', JSON.stringify(cloudData.chatHistory));
                    chatHistory = cloudData.chatHistory;
                    isGameStarted = cloudData.isGameStarted || true;
                    
                    cloudStatus.innerText = "✅ 雲端載入成功！";
                    alert("✨ 雲端存檔同步成功！已成功載入最新進度，請點擊「重溫舊夢」繼續遊戲！");
                    updateSaveButtonsState();
                }
            } catch (err) {
                console.error(err);
                cloudStatus.innerText = "❌ 雲端同步失敗";
                alert("同步失敗，請確認雲端資訊設定無誤。");
            }
        });

        // ======================================================================

        function getRelevantContext(text) {
            if (wikiData.length === 0) return "";
            let contextBlocks = [];
            for (let entry of wikiData) {
                const title = entry.title || entry.name || "";
                const content = entry.content || entry.text || "";
                if (title && text.includes(title)) {
                    contextBlocks.push(`[資料：${title}]\n${content}`);
                }
            }
            if (contextBlocks.length > 0) {
                return `\n\n【系統提示：以下是與當前場景相關的世界觀歷史背景】\n${contextBlocks.join('\n\n')}`;
            }
            return "";
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            if (sender === 'user') {
                msgDiv.className = 'message-user p-4 max-w-[85%] md:max-w-2xl shadow-md text-[15px]';
                msgDiv.textContent = text;
            } else {
                msgDiv.className = 'message-bot rounded-r-xl rounded-bl-xl p-5 md:p-6 shadow-md max-w-[90%] md:max-w-4xl';
                msgDiv.innerHTML = `<div class="prose prose-invert max-w-none">${marked.parse(text)}</div>`;
            }
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function createChoiceButtons(text) {
            const oldButtons = document.getElementById('choices-container');
            if (oldButtons) oldButtons.remove();

            const match = text.match(/【可選行動】([\s\S]*)/);
            if (!match) return;

            const lines = match[1]
                .split("\n")
                .map(x => x.trim())
                .filter(x => x && (x.startsWith('1') || x.startsWith('2') || x.startsWith('3') || x.startsWith('4') || x.startsWith('5') || x.startsWith('*') || x.startsWith('-')));

            if (lines.length === 0) return;

            const div = document.createElement("div");
            div.id = "choices-container";
            div.className = "flex flex-wrap gap-2 mt-4 max-w-4xl";

            lines.forEach(line => {
                const btn = document.createElement("button");
                btn.className = "bg-violet-700 hover:bg-violet-600 text-white font-medium text-sm px-4 py-2.5 rounded-xl transition duration-150 shadow-sm";
                btn.innerText = line;
                btn.onclick = () => { callGeminiAPI(line); };
                div.appendChild(btn);
            });

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function callGeminiAPI(userMessage) {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) return alert("請先填寫 Gemini API Key！");

            localStorage.setItem('kpop_gemini_key', apiKey);
            userInput.disabled = true;
            sendBtn.disabled = true;
            appendMessage('user', userMessage);
            
            const loadingId = 'loading-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `<div id="${loadingId}" class="text-gray-400 italic text-sm ml-4">GM 正在構思劇情...</div>`);
            chatBox.scrollTop = chatBox.scrollHeight;

            const context = getRelevantContext(userMessage);
            let promptText = !isGameStarted ? `${SYSTEM_PROMPT}\n\n玩家已準備好，請輸出第一回合的開局角色設定問卷。` : `玩家行動：${userMessage}${context}`;
            if(!isGameStarted) isGameStarted = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: [ ...chatHistory, { role: 'user', parts: [{ text: promptText }] } ],
                        generationConfig: { temperature: 0.7 }
                    })
                });

                const text = await response.text();
                document.getElementById(loadingId)?.remove();
                const data = JSON.parse(text);

                if (data.error) {
                    appendMessage('bot', `**系統錯誤：** ${data.error.message}`);
                } else {
                    const botReply = data.candidates[0].content.parts[0].text;
                    appendMessage('bot', botReply);
                    createChoiceButtons(botReply);
                    
                    chatHistory.push({ role: 'user', parts: [{ text: promptText }] });
                    chatHistory.push({ role: 'model', parts: [{ text: botReply }] });
                    if (chatHistory.length > 14) chatHistory = chatHistory.slice(-14);
                    
                    localStorage.setItem('kpop_chat_history', JSON.stringify(chatHistory));
                    updateSaveButtonsState();
                }
            } catch (err) {
                document.getElementById(loadingId)?.remove();
                appendMessage('bot', `### 發生錯誤\n\n${err.message}`);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.value = '';
            userInput.focus();
        }

        function lockMenuButtons() {
            newGameBtn.disabled = true;
            newGameBtn.innerText = "遊戲進行中...";
            newGameBtn.className = "w-full bg-gray-600 text-gray-400 font-bold py-2.5 px-4 rounded-lg cursor-not-allowed text-sm";
            loadGameBtn.disabled = true;
            loadGameBtn.innerText = "存檔已載入";
            loadGameBtn.className = "w-full bg-gray-600 text-gray-400 font-bold py-2.5 px-4 rounded-lg cursor-not-allowed text-sm";
            deleteGameBtn.disabled = true;
        }

        newGameBtn.addEventListener('click', () => {
            if (!document.getElementById('apiKey').value.trim()) return alert("請先輸入 Gemini API Key");
            const hasSaved = localStorage.getItem('kpop_chat_history');
            if (hasSaved && JSON.parse(hasSaved).length > 0) {
                if (!confirm("⚠️ 注意：開啟新的人生會【完全覆蓋並刪除】本機存檔！確定要重新開始嗎？")) return;
            }
            localStorage.removeItem('kpop_chat_history');
            chatHistory = [];
            isGameStarted = false;
            lockMenuButtons();
            chatBox.innerHTML = ''; 
            userInput.disabled = false;
            sendBtn.disabled = false;
            callGeminiAPI("遊戲開始");
        });

        loadGameBtn.addEventListener('click', () => {
            if (!document.getElementById('apiKey').value.trim()) return alert("請先輸入 Gemini API Key");
            const localHistory = localStorage.getItem('kpop_chat_history');
            if (!localHistory) return alert("找不到可讀取的存檔！");

            chatHistory = JSON.parse(localHistory);
            isGameStarted = true;
            lockMenuButtons();
            chatBox.innerHTML = ''; 
            userInput.disabled = false;
            sendBtn.disabled = false;

            chatHistory.forEach(msg => {
                const sender = msg.role === 'user' ? 'user' : 'bot';
                if (sender === 'user' && msg.parts[0].text.startsWith("玩家行動：")) {
                    appendMessage('user', msg.parts[0].text.replace("玩家行動：", "").split("\n\n【系統提示：")[0]);
                } else if (sender === 'bot') {
                    appendMessage('bot', msg.parts[0].text);
                }
            });
            
            if (chatHistory.length > 0 && chatHistory[chatHistory.length - 1].role === 'model') {
                createChoiceButtons(chatHistory[chatHistory.length - 1].parts[0].text);
            }
            appendMessage('bot', `<p style="color:#4ade80; font-weight:bold;">✨ 已成功讀取本機進度。請繼續你的韓娛旅程！</p>`);
        });

        deleteGameBtn.addEventListener('click', () => {
            if (!confirm("⚠️ 確定要永久刪除你的本地存檔嗎？此動作無法復原！")) return;
            localStorage.removeItem('kpop_chat_history');
            chatHistory = [];
            isGameStarted = false;
            chatBox.innerHTML = `<div class="message-bot rounded-r-xl rounded-bl-xl p-5 shadow-md max-w-3xl"><p style="color: #f87171; font-weight: bold;">🗑️ 本地存檔已徹底刪除！</p></div>`;
            updateSaveButtonsState();
        });

        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            if (text) callGeminiAPI(text);
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
